<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/register.css">
    <title>Document</title>
</head>
<body>
    
    <form>
        <div class="logo_register">
            <a href="index.html" class="exit_icon">
                <img src="icon/cross (1).svg" alt="">
            </a>
            <div class="logo_image">
                <img src="img/Screenshot 2026-02-23 132916.png" alt="">
            </div>
            
        </div>
        <!-- --------------------- -->
        <div class="data_register">
            <div class="data_box userName">
                <label for="">Nome</label>
                <input type="text" placeholder="insira um nome">
            </div>

            <div class="data_box userEmail">
                <label for="">Email</label>
                <input type="email" placeholder="insira um email">
            </div>
            
            <div class="data_box userPassword">
                <label for="">Senha</label>
                <input type="password" placeholder="insira uma senha">
            </div>
            <!-- --------------------- -->
            <a class="register_log" href="">Cadastrar</a>
            <!-- --------------------- -->
            <div class="alternative">
                <div class="alternative_top">
                    <h4>Possui uma conta?</h4>
                    <a href="">Entrar</a>
                </div>

                <div class="alternative_middle">
                    <span>OU</span>
                </div>
                
                <div class="alternative_bottom">
                    <div class="logo_box">a
                        <img src="" alt="">
                    </div>
                    <a href="">Entrar usando seu CID</a>
                </div>

            </div>
            <!-- --------------------- -->
        </div>


    </form>

</body>
</html>
