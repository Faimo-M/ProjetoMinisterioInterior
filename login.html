<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/login.css">
    <title>Document</title>
</head>
<body>

    <div class="container">
        <div class="imagem">
            <img src="img/Cloud call center.jpg" alt="vista">
        </div>
        <!-- //////// fim imagem ////////// -->
        
        <div class="box_form">
            <form action="login.html" method="POST">
                <div class="logo_img">
                    <img src="img/Screenshot 2026-02-23 132916.png" alt="">
                </div>
                <!-- //////// fim logo_img ////////// -->
            
                <div class="credencial">

                    <div class="box box_1">
                        <label>Email</label>
                        <input type="email" name="user_email" placeholder="@gmail.gov" required>
                    </div>
                    <!-- //////// fim box_1 ////////// -->

                    <div class="box box_2">
                        <label>Senha</label>
                        <input type="password" name="user_password" placeholder="insira a sua senha" required>
                    </div>
                    <!-- //////// fim box_2 ////////// -->

                    <div class="box box_3">
                        <input type="submit" value="Entrar">
                    </div>
                    <!-- //////// im box_3 ////////// -->

                </div>
                <!-- //////// fim credencial ////////// -->

            </form>
            <!-- //////// fim form ////////// -->

        </div>
        <!-- //////// fim box_form ////////// -->
        
    </div>
    <!-- //////// fim container ////////// -->
    
</body>
</html>
