<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/call_login.css">
    <title>Document</title>
</head>
<body>
    <main>
        <aside>
            <div class="Text">
                <h1>Tópicos</h1>
            </div>
            
            <div class="box_list">
                <ul>
                    <li><a href="">Tópico_1</a></li>
                    <li><a href="">Tópico_2</a></li>
                    <li><a href="">Tópico_3</a></li>
                    <li><a href="">Tópico_4</a></li>
                    <li><a href="">Tópico_5</a></li>
                    <li><a href="">Tópico_6</a></li>
                    
                </ul>

                <div class="box_exit">
                    <div class="exit_btn">
                        <img src="" alt="">
                    </div>
                    <span>voltar</span>
                </div>

            </div>

        </aside>

        <div class="login_box">
            <form action="" method="">
                <div class="logo">LOGO</div>
                <!-- //////////////////////////////// -->
                <div class="data_insertion">
                    <div class="data_box">
                        <label for="">Email:</label>
                        <input type="email" placeholder="insira o seu email"> 
                    </div>
                    <div class="data_box">
                        <label for="">Senha:</label>
                        <input type="password" placeholder="insira a sua senha">
                    </div>
                    <div class="data_box">
                        <input type="submit" value="Entrar">
                    </div>
                </div>
                <!-- //////////////////////////////// -->
                <div class="second_path">
                    <div class="path_1">
                        <span>Não tem uma conta? <a href="">Criar conta</a></span>
                        <span class="option">ou</span>
                    </div>
                    <div class="path_2">
                        <div class="icon"></div>
                        <span>Entrar usando seu CID</span>
                    </div>
                    
                </div>

                
                
            </form>
        </div>
    </main>
    
</body>
</html>
